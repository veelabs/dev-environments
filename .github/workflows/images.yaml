name: images

on:
  push:
    paths:
      - "images/**"
      - "provisioner/**"
      - ".github/workflows/images.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Bump these to cut a new image version; chart values pin the same tags.
  SANDBOX_TAG: "1.17.15-1.14.1" # <opencode-ai>-<@openchamber/web>
  PROVISIONER_TAG: "0.4.0"
  LANDING_TAG: "0.3.3"

jobs:
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: images/sandbox
          push: true
          tags: |
            ghcr.io/veelabs/dev-environments-sandbox:${{ env.SANDBOX_TAG }}
            ghcr.io/veelabs/dev-environments-sandbox:sha-${{ github.sha }}
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,scope=sandbox,mode=max

  provisioner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/provisioner/Dockerfile
          push: true
          tags: |
            ghcr.io/veelabs/dev-environments-provisioner:${{ env.PROVISIONER_TAG }}
            ghcr.io/veelabs/dev-environments-provisioner:sha-${{ github.sha }}
          cache-from: type=gha,scope=provisioner
          cache-to: type=gha,scope=provisioner,mode=max

  landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/landing/Dockerfile
          push: true
          tags: |
            ghcr.io/veelabs/dev-environments-landing:${{ env.LANDING_TAG }}
            ghcr.io/veelabs/dev-environments-landing:sha-${{ github.sha }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,scope=landing,mode=max

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: provisioner/go.mod
      - run: go test ./...
        working-directory: provisioner
      - run: go vet ./...
        working-directory: provisioner
