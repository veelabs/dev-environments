# -- REQUIRED: public DNS suffix for environment hostnames
#    (oc-<id>.<baseDomain>, oc-<id>-<port>.<baseDomain>).
#    A wildcard route *.<baseDomain> must reach the cluster ingress.
baseDomain: ""

# -- REQUIRED: cluster DNS service IP, used by the port-router's nginx
#    resolver (k3s default: 10.43.0.10; kubeadm default: 10.96.0.10).
clusterDNS: ""

temporal:
  # Temporal frontend gRPC endpoint the provisioner worker connects to.
  hostPort: temporal-frontend.temporal:7233
  namespace: default
  taskQueue: dev-environments

sandbox:
  # SandboxTemplate name; the zero-replica warm pool is derived from it as
  # shadow-pool-<templateName> (load-bearing name, see docs/runbook.md).
  templateName: opencode-dev
  image: ghcr.io/veelabs/dev-environments-sandbox:1.17.15-1.14.1@sha256:3805221aa034d0bc34beca8098ab12b0a3f6508d9db9b008efe1e5efd1face28
  # In-pod port OpenChamber listens on. Non-default (1982) keeps framework
  # favourites (3000, 5173, 8080...) free for user apps.
  port: 1982
  workspaceSize: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1536Mi

provisioner:
  image: ghcr.io/veelabs/dev-environments-provisioner:0.10.0@sha256:416fe0ee177c7acf5a16d922f646bf933df35b22d7b8c522b960028d4c29c5c6
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

landing:
  # Public "claim a devbox" page, served at https://<subdomain>.<baseDomain>
  # (inside the wildcard edge route; no extra DNS needed). "oc" is safe: env
  # hostnames are always oc-<name>.<baseDomain>, never bare oc.
  enabled: true
  subdomain: oc
  image: ghcr.io/veelabs/dev-environments-landing:0.3.3@sha256:12a9254b1d93952e848527bb76332223f3cac8607531bd52f9402d0d9cd1a4fa
  # Lifetime granted to devboxes claimed from the page (Go duration).
  claimTTL: 1h
  # Running ProvisionDevEnvironment workflows allowed before the page answers
  # "all devboxes are taken" (capacity: 2-3 envs on the current nodes).
  maxConcurrent: 2
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

portRouter:
  image: nginx:1.29-alpine@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de
  # Bump to force a pod restart when the nginx ConfigMap changes.
  configRevision: "1"
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

ingressClassName: traefik

preflight:
  enabled: true
  kubectlImage: rancher/kubectl:v1.35.0@sha256:63a9f14d017459f47d23cb266b2857e82ffe6602d8955eef00ce111b2d8a61cf
  busyboxImage: busybox:1.37@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
