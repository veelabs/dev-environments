# Port-router: exposes arbitrary sandbox ports as
# https://oc-<id>-<port>.<baseDomain> (see docs/plans/port-exposure-dx.md).
#
# Traefik matches the <env>-<port> hostname shape via HostRegexp and hands the
# request to this nginx, which parses the Host header and proxies to the
# sandbox pod DIRECTLY on the requested port — via the sandbox controller's
# portless headless Service (oc-<id>.<ns>.svc...), which resolves to the pod
# IP. No per-port resources exist; a hostname is "live" iff something listens.
{{- $domainRe := .Values.baseDomain | replace "." "\\." }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: port-router
data:
  default.conf: |
    # WebSocket upgrade passthrough
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        # oc-<env>-<port>.<baseDomain> — env greedy, port = trailing digit run
        # (quoted: unquoted {m,n} braces are parsed as an nginx config block)
        server_name "~^oc-(?<env>[0-9a-z-]+)-(?<port>[0-9]{2,5})\.{{ $domainRe }}$";

        # cluster DNS; short TTL so pod churn is picked up quickly
        resolver {{ required "clusterDNS is required" .Values.clusterDNS }} valid=10s;

        location / {
            # Headless service of the Sandbox → pod IP, arbitrary port.
            proxy_pass http://oc-$env.{{ .Release.Namespace }}.svc.cluster.local:$port;

            proxy_http_version 1.1;
            # Codespaces-style Host rewrite: dev servers' DNS-rebinding
            # protection (Vite allowedHosts, Rails HostAuthorization, ...)
            # whitelists localhost by default → zero-config previews.
            # Real host in X-Forwarded-Host.
            proxy_set_header Host localhost:$port;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Dev servers stream (HMR websockets, SSE): no buffering, long reads
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            client_max_body_size 100m;
        }
    }

    # Anything else (shouldn't arrive here — Traefik only routes the regex)
    server {
        listen 8080 default_server;
        return 404;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: port-router
  labels:
    app: port-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: port-router
  template:
    metadata:
      labels:
        app: port-router
      annotations:
        # nginx only reads config at boot; bump values.portRouter.configRevision
        # (or rely on chart upgrades changing this) to restart on config change.
        config/revision: {{ .Values.portRouter.configRevision | quote }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.portRouter.image }}
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 5
          resources:
            {{- toYaml .Values.portRouter.resources | nindent 12 }}
      volumes:
        - name: conf
          configMap:
            name: port-router
---
apiVersion: v1
kind: Service
metadata:
  name: port-router
  labels:
    app: port-router
spec:
  selector:
    app: port-router
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# Traefik v3 CRD. Matches ONLY the env-port hostname shape; exact-Host
# Ingresses (incl. plain oc-<id>.<baseDomain>) are untouched.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: port-router
spec:
  entryPoints:
    - web
  routes:
    - match: HostRegexp(`^oc-[0-9a-z-]+-[0-9]{2,5}\.{{ $domainRe }}$`)
      kind: Rule
      services:
        - name: port-router
          port: 80
