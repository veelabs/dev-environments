{{- if .Values.landing.enabled }}
# Landing page: the public "claim a devbox" front door at
# https://<landing.subdomain>.<baseDomain>. The subdomain is covered by the
# same wildcard *.<baseDomain> edge route as the environments, and can never
# collide with them (env hostnames always carry the oc- prefix plus a name).
# Serves the embedded page and a JSON API that starts ProvisionDevEnvironment
# workflows and relays their "status" query while the page polls.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  labels:
    app: landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
    spec:
      containers:
        - name: landing
          image: {{ .Values.landing.image }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TEMPORAL_HOSTPORT
              value: {{ .Values.temporal.hostPort | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: TASK_QUEUE
              value: {{ .Values.temporal.taskQueue | quote }}
            - name: CLAIM_TTL
              value: {{ .Values.landing.claimTTL | quote }}
            - name: MAX_CONCURRENT
              value: {{ .Values.landing.maxConcurrent | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.landing.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: landing
  labels:
    app: landing
spec:
  selector:
    app: landing
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing
  labels:
    app: landing
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - host: {{ printf "%s.%s" .Values.landing.subdomain (required "baseDomain is required" .Values.baseDomain) | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landing
                port:
                  name: http
{{- end }}
