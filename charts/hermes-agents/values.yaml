baseDomain: ""

temporal:
  hostPort: temporal-frontend.temporal:7233
  namespace: default
  taskQueue: hermes-agents

worker:
  image: ghcr.io/veelabs/dev-environments-provisioner:0.10.0@sha256:416fe0ee177c7acf5a16d922f646bf933df35b22d7b8c522b960028d4c29c5c6
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

landing:
  image: ghcr.io/veelabs/dev-environments-landing:0.9.0@sha256:1e7d4a164d3f04b1c7796050dbfca3b646ed25d5befda982a5936d5aa1b9d0bf
  subdomain: agents
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
      ephemeral-storage: 16Mi
    limits:
      cpu: 500m
      memory: 64Mi
      ephemeral-storage: 64Mi

router:
  hostname: ""
  nodePort: 30864
  tailnetCIDR: 100.64.0.0/10
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 32Mi

backup:
  repository: ""
  secretName: hermes-backup
  image: docker.io/restic/restic:0.19.1@sha256:136600b6ff6843d61d355f7f71f460a166429f35de6fd11b568fece3c9a4d510
  scheduleHourUTC: 0
  staggerMinutes: 60
  maintenance:
    schedule: "0 4 * * *"
    keepDaily: 7
    keepWeekly: 4
    keepMonthly: 6

monitoring:
  enabled: true

ingressClassName: traefik

hermes:
  image: docker.io/nousresearch/hermes-agent:v2026.7.7.2@sha256:3db34ce19adfa080736a2a3feb0316dbcccc588faa9afe7fd8ae1c03b4f1a53a
  storageClass: local-path
  apiSecret: hermes-api
  gitAllowedHosts:
    - github.com

preflight:
  enabled: true
  kubectlImage: rancher/kubectl:v1.35.0@sha256:63a9f14d017459f47d23cb266b2857e82ffe6602d8955eef00ce111b2d8a61cf
  busyboxImage: busybox:1.37@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
