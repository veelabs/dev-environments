baseDomain: ""

temporal:
  hostPort: temporal-frontend.temporal:7233
  namespace: default
  taskQueue: hermes-agents

worker:
  image: ghcr.io/veelabs/dev-environments-provisioner:0.6.0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

landing:
  image: ghcr.io/veelabs/dev-environments-landing:0.5.0
  subdomain: agents
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

router:
  hostname: ""
  nodePort: 30864
  tailnetCIDR: 100.64.0.0/10
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 32Mi

ingressClassName: traefik

hermes:
  image: docker.io/nousresearch/hermes-agent:v2026.7.7.2@sha256:3db34ce19adfa080736a2a3feb0316dbcccc588faa9afe7fd8ae1c03b4f1a53a
  storageClass: local-path
  apiSecret: hermes-api

preflight:
  enabled: true
  kubectlImage: rancher/kubectl:v1.35.0
  busyboxImage: busybox:1.37
