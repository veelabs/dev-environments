{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hermes-backups
  labels:
    release: monitoring
spec:
  groups:
    - name: hermes-backups
      rules:
        - alert: HermesBackupJobFailed
          expr: >-
            kube_job_status_failed{namespace={{ .Release.Namespace | quote }},job_name=~"hermes-backup-([0-9a-f]{16}(-.*)?|maintenance-.+)"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Hermes backup Job failed
            description: A Hermes backup or repository-maintenance Job has failed in {{ .Release.Namespace }}.
        - alert: HermesBackupStale
          expr: >-
            (kube_cronjob_spec_suspend{namespace={{ .Release.Namespace | quote }},cronjob=~"hermes-backup-[0-9a-f]{16}"} == 0)
            and on(namespace, cronjob)
            (((time() - kube_cronjob_status_last_successful_time{namespace={{ .Release.Namespace | quote }},cronjob=~"hermes-backup-[0-9a-f]{16}"}) > 26 * 3600)
            or
            (((time() - kube_cronjob_created{namespace={{ .Release.Namespace | quote }},cronjob=~"hermes-backup-[0-9a-f]{16}"}) > 26 * 3600)
            unless on(namespace, cronjob)
            kube_cronjob_status_last_successful_time{namespace={{ .Release.Namespace | quote }},cronjob=~"hermes-backup-[0-9a-f]{16}"}))
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Hermes scheduled backup is stale
            description: An active Hermes backup schedule has not succeeded in 26 hours, including schedules that have never succeeded.
{{- end }}
