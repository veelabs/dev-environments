apiVersion: batch/v1
kind: CronJob
metadata:
  name: hermes-backup-maintenance
  labels:
    app: hermes-backup-maintenance
spec:
  schedule: {{ .Values.backup.maintenance.schedule | quote }}
  timeZone: UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: hermes-backup-maintenance
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 10800
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: hermes-backup-maintenance
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: maintenance
              image: {{ .Values.backup.image }}
              command: ["/bin/sh", "-ceu"]
              args:
                - |
                  restic_nas() { restic -o 'sftp.args=-i /secret/ssh-privatekey -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new' "$@"; }
                  for delay in 0 600 1200; do
                    sleep "$delay"
                    if restic_nas forget --tag hermes-agent --group-by host --keep-daily {{ .Values.backup.maintenance.keepDaily }} --keep-weekly {{ .Values.backup.maintenance.keepWeekly }} --keep-monthly {{ .Values.backup.maintenance.keepMonthly }} &&
                       restic_nas prune &&
                       restic_nas check; then
                      exit 0
                    fi
                  done
                  exit 1
              env:
                - name: HOME
                  value: /tmp
                - name: RESTIC_CACHE_DIR
                  value: /tmp/restic-cache
                - name: RESTIC_REPOSITORY
                  value: {{ required "backup.repository is required" .Values.backup.repository | quote }}
                - name: RESTIC_PASSWORD_FILE
                  value: /secret/RESTIC_PASSWORD
              resources:
                requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 1Gi}
                limits: {cpu: 1, memory: 1Gi, ephemeral-storage: 10Gi}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: secret
                  mountPath: /secret
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: secret
              secret:
                secretName: {{ .Values.backup.secretName | quote }}
                defaultMode: 0400
            - name: tmp
              emptyDir:
                sizeLimit: 10Gi
