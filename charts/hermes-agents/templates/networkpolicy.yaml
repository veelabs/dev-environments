# Bootstrap pods are offline. Runtime agent egress remains unrestricted while
# ingress reaches only the dashboard from Traefik and API from the router.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-bootstrap-deny-all
spec:
  podSelector:
    matchLabels:
      renala.dev/hermes-bootstrap: "true"
  policyTypes: ["Ingress", "Egress"]
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-agents
spec:
  podSelector:
    matchLabels:
      app: hermes-agent
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 9119
    - from:
        - podSelector:
            matchLabels:
              app: hermes-api-router
      ports:
        - protocol: TCP
          port: 8642
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-api-router
spec:
  podSelector:
    matchLabels:
      app: hermes-api-router
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - ipBlock:
            cidr: {{ .Values.router.tailnetCIDR }}
      ports:
        - protocol: TCP
          port: 8642
