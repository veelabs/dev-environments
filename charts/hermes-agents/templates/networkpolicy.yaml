# Agent egress is intentionally unrestricted. Ingress reaches only the
# dashboard from Traefik and the API from the reserved future router identity.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-agents
spec:
  podSelector:
    matchLabels:
      app: hermes-agent
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 9119
    - from:
        - podSelector:
            matchLabels:
              app: hermes-api-router
      ports:
        - protocol: TCP
          port: 8642
