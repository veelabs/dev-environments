apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-landing
  labels:
    app: hermes-landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-landing
  template:
    metadata:
      labels:
        app: hermes-landing
    spec:
      serviceAccountName: hermes-landing
      containers:
        - name: landing
          image: {{ .Values.landing.image }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LANDING_KIND
              value: "hermes"
            - name: TEMPORAL_HOSTPORT
              value: {{ .Values.temporal.hostPort | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: TASK_QUEUE
              value: {{ .Values.temporal.taskQueue | quote }}
            - name: SANDBOX_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HERMES_API_SECRET
              value: {{ .Values.hermes.apiSecret | quote }}
            - name: HERMES_API_BASE_URL
              value: {{ printf "http://%s:%v" (required "router.hostname is required" .Values.router.hostname) .Values.router.nodePort | quote }}
            - name: HERMES_GIT_ALLOWED_HOSTS
              value: {{ join "," .Values.hermes.gitAllowedHosts | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.landing.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-landing
spec:
  selector:
    app: hermes-landing
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-landing
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - host: {{ printf "%s.%s" .Values.landing.subdomain (required "baseDomain is required" .Values.baseDomain) | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-landing
                port:
                  name: http
