{{- if .Values.preflight.enabled }}
{{- $tHost := (split ":" .Values.temporal.hostPort)._0 }}
{{- $tPort := (split ":" .Values.temporal.hostPort)._1 }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "-5"
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingressclasses"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-hermes-preflight
subjects:
  - kind: ServiceAccount
    name: hermes-preflight
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "-5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.hermes.apiSecret | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hermes-preflight
subjects:
  - kind: ServiceAccount
    name: hermes-preflight
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "0"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app: hermes-preflight
    spec:
      serviceAccountName: hermes-preflight
      restartPolicy: Never
      containers:
        - name: kubernetes-check
          image: {{ .Values.preflight.kubectlImage }}
          command: ["sh", "-c"]
          args:
            - >-
              kubectl get --raw /apis/agents.x-k8s.io/v1beta1 >/dev/null &&
              kubectl get storageclass {{ .Values.hermes.storageClass | quote }} &&
              kubectl get ingressclass traefik &&
              test -n "$(kubectl -n {{ .Release.Namespace }} get secret {{ .Values.hermes.apiSecret | quote }} -o jsonpath='{.data.key}')"
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 64Mi}
        - name: temporal-check
          image: {{ .Values.preflight.busyboxImage }}
          command: ["sh", "-c"]
          args:
            - >-
              nc -w 5 {{ $tHost }} {{ $tPort }} </dev/null ||
              { echo "PREFLIGHT FAILED: Temporal frontend unreachable at {{ .Values.temporal.hostPort }}" >&2; exit 1; }
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {memory: 32Mi}
{{- end }}
