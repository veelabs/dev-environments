{{- if .Values.preflight.enabled }}
{{- $tHost := (split ":" .Values.temporal.hostPort)._0 }}
{{- $tPort := (split ":" .Values.temporal.hostPort)._1 }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "-5"
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingressclasses"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-hermes-preflight
subjects:
  - kind: ServiceAccount
    name: hermes-preflight
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hermes-preflight
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/hook-weight: "0"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app: hermes-preflight
    spec:
      serviceAccountName: hermes-preflight
      restartPolicy: Never
      containers:
        - name: sandbox-api-check
          image: {{ .Values.preflight.kubectlImage }}
          command: ["kubectl"]
          args: ["get", "--raw", "/apis/agents.x-k8s.io/v1beta1"]
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 64Mi}
        - name: storage-class-check
          image: {{ .Values.preflight.kubectlImage }}
          command: ["kubectl"]
          args: ["get", "storageclass", {{ .Values.hermes.storageClass | quote }}]
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 64Mi}
        {{- if .Values.monitoring.enabled }}
        - name: monitoring-api-check
          image: {{ .Values.preflight.kubectlImage }}
          command: ["kubectl"]
          args: ["get", "--raw", "/apis/monitoring.coreos.com/v1"]
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 64Mi}
        {{- end }}
        - name: ingress-class-check
          image: {{ .Values.preflight.kubectlImage }}
          command: ["kubectl"]
          args: ["get", "ingressclass", "traefik"]
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 64Mi}
        - name: traefik-api-check
          image: {{ .Values.preflight.kubectlImage }}
          command: ["kubectl"]
          args: ["get", "--raw", "/apis/traefik.io/v1alpha1"]
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 64Mi}
        - name: control-plane-check
          image: {{ .Values.preflight.kubectlImage }}
          command: ["kubectl"]
          args: ["wait", "nodes", "--selector=node-role.kubernetes.io/control-plane=true", "--for=condition=Ready", "--timeout=30s"]
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 64Mi}
        - name: node-port-check
          image: {{ .Values.preflight.busyboxImage }}
          command: ["sh", "-ceu"]
          args:
            - |
              api="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}"
              get_kubernetes_api() {
                wget -qO- --ca-certificate=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                  --header="Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" "$api$1"
              }
              if service="$(get_kubernetes_api /api/v1/namespaces/{{ .Release.Namespace }}/services/hermes-api-router)"; then
                printf '%s' "$service" | grep -Eq '"type":[[:space:]]*"NodePort"'
                printf '%s' "$service" | grep -Eq '"nodePort":[[:space:]]*{{ .Values.router.nodePort }}([,}])'
                printf '%s' "$service" | grep -Eq '"externalTrafficPolicy":[[:space:]]*"Local"'
              else
                services="$(get_kubernetes_api /api/v1/services)"
                ! printf '%s' "$services" | grep -Eq '"nodePort":[[:space:]]*{{ .Values.router.nodePort }}([,}])'
              fi
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {memory: 32Mi}
        - name: api-secret-check
          image: {{ .Values.preflight.busyboxImage }}
          command: ["sh", "-c"]
          args: ["test -s /secret/key"]
          volumeMounts:
            - name: api-secret
              mountPath: /secret
              readOnly: true
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {memory: 32Mi}
        - name: temporal-check
          image: {{ .Values.preflight.busyboxImage }}
          command: ["sh", "-c"]
          args:
            - >-
              nc -w 5 {{ $tHost }} {{ $tPort }} </dev/null ||
              { echo "PREFLIGHT FAILED: Temporal frontend unreachable at {{ .Values.temporal.hostPort }}" >&2; exit 1; }
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {memory: 32Mi}
        - name: backup-secret-check
          image: {{ .Values.preflight.busyboxImage }}
          command: ["sh", "-c"]
          args: ["test -s /secret/RESTIC_PASSWORD && test -s /secret/ssh-privatekey"]
          volumeMounts:
            - name: backup-secret
              mountPath: /secret
              readOnly: true
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {memory: 32Mi}
      volumes:
        - name: api-secret
          secret:
            secretName: {{ .Values.hermes.apiSecret | quote }}
            items:
              - key: key
                path: key
        - name: backup-secret
          secret:
            secretName: {{ .Values.backup.secretName | quote }}
            items:
              - key: RESTIC_PASSWORD
                path: RESTIC_PASSWORD
              - key: ssh-privatekey
                path: ssh-privatekey
{{- end }}
