apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-api-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-api-router
  template:
    metadata:
      labels:
        app: hermes-api-router
    spec:
      nodeSelector:
        {{- toYaml .Values.router.nodeSelector | nindent 8 }}
      containers:
        - name: router
          image: {{ .Values.landing.image }}
          ports:
            - name: http
              containerPort: 8642
          env:
            - name: LANDING_KIND
              value: router
            - name: LISTEN_ADDR
              value: :8642
            - name: TAILNET_CIDR
              value: {{ .Values.router.tailnetCIDR | quote }}
            - name: UPSTREAM_SUFFIX
              value: {{ printf ".%s.svc.cluster.local:8642" .Release.Namespace | quote }}
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-api-router
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app: hermes-api-router
  ports:
    - name: http
      port: 8642
      targetPort: http
      nodePort: {{ .Values.router.nodePort }}
