apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-worker
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hermes-worker
subjects:
  - kind: ServiceAccount
    name: hermes-worker
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-landing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-landing
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-landing
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hermes-landing
subjects:
  - kind: ServiceAccount
    name: hermes-landing
    namespace: {{ .Release.Namespace }}
