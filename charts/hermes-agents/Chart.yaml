apiVersion: v2
name: hermes-agents
description: Persistent Hermes agents provisioned through Temporal and Agent Sandbox
type: application
version: 0.6.0
appVersion: "0.6.0"
home: https://github.com/veelabs/dev-environments
annotations:
  dev-environments.veelabs.dev/requires: |
    1. Agent Sandbox v1beta1 Sandbox API
    2. Temporal frontend
    3. Traefik ingress class and wildcard edge route
    4. local-path storage class
    5. Existing namespace API and backup credential Secrets
    6. PrometheusRule monitoring.coreos.com/v1 CRD when monitoring is enabled
