rule_files:
  - .rendered-prometheus-rules.yaml
evaluation_interval: 5m
tests:
  - name: failed backup job alerts after five minutes
    interval: 5m
    input_series:
      - series: kube_job_status_failed{namespace="hermes-agents",job_name="hermes-backup-0123456789abcdef-failed"}
        values: 1x3
    alert_rule_test:
      - eval_time: 10m
        alertname: HermesBackupJobFailed
        exp_alerts:
          - exp_labels:
              alertname: HermesBackupJobFailed
              namespace: hermes-agents
              job_name: hermes-backup-0123456789abcdef-failed
              severity: warning
            exp_annotations:
              summary: Hermes backup Job failed
              description: A Hermes backup or repository-maintenance Job has failed in hermes-agents.
  - name: stale backup alerts with old or absent success
    interval: 5m
    input_series:
      - series: kube_cronjob_spec_suspend{namespace="hermes-agents",cronjob="hermes-backup-0123456789abcdef"}
        values: 0x400
      - series: kube_cronjob_created{namespace="hermes-agents",cronjob="hermes-backup-0123456789abcdef"}
        values: 0x400
      - series: kube_cronjob_status_last_successful_time{namespace="hermes-agents",cronjob="hermes-backup-0123456789abcdef"}
        values: 0x400
      - series: kube_cronjob_spec_suspend{namespace="hermes-agents",cronjob="hermes-backup-fedcba9876543210"}
        values: 0x400
      - series: kube_cronjob_created{namespace="hermes-agents",cronjob="hermes-backup-fedcba9876543210"}
        values: 0x400
    alert_rule_test:
      - eval_time: 28h
        alertname: HermesBackupStale
        exp_alerts:
          - exp_labels:
              alertname: HermesBackupStale
              namespace: hermes-agents
              cronjob: hermes-backup-0123456789abcdef
              severity: warning
            exp_annotations:
              summary: Hermes scheduled backup is stale
              description: An active Hermes backup schedule has not succeeded in 26 hours, including schedules that have never succeeded.
          - exp_labels:
              alertname: HermesBackupStale
              namespace: hermes-agents
              cronjob: hermes-backup-fedcba9876543210
              severity: warning
            exp_annotations:
              summary: Hermes scheduled backup is stale
              description: An active Hermes backup schedule has not succeeded in 26 hours, including schedules that have never succeeded.
  - name: fresh success and suspended schedules do not alert
    interval: 5m
    input_series:
      - series: kube_cronjob_spec_suspend{namespace="hermes-agents",cronjob="hermes-backup-0123456789abcdef"}
        values: 0x400
      - series: kube_cronjob_created{namespace="hermes-agents",cronjob="hermes-backup-0123456789abcdef"}
        values: 0x400
      - series: kube_cronjob_status_last_successful_time{namespace="hermes-agents",cronjob="hermes-backup-0123456789abcdef"}
        values: 100000x400
      - series: kube_cronjob_spec_suspend{namespace="hermes-agents",cronjob="hermes-backup-fedcba9876543210"}
        values: 1x400
      - series: kube_cronjob_created{namespace="hermes-agents",cronjob="hermes-backup-fedcba9876543210"}
        values: 0x400
    alert_rule_test:
      - eval_time: 28h
        alertname: HermesBackupStale
        exp_alerts: []
